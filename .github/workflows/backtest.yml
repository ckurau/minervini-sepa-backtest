name: Minervini SEPA Backtest

on:
  workflow_dispatch:        # run manually with a button click
  schedule:
    - cron: '0 16 * * 1-5' # optional: auto-run Mon–Fri at 4pm UTC

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 hours — needed for full S&P 1500 download + simulation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy matplotlib tqdm lxml html5lib

      - name: Run backtest
        run: python minervini_sepa_backtest.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            minervini_results.png
            minervini_trades.csv
          retention-days: 30
